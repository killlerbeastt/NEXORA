<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Outer glow ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#FFB6A6" stroke-width="1" opacity="0.35"/>
  <!-- Main ring -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="#FFB6A6" stroke-width="1.8" opacity="0.9"/>
  <!-- Cross lines (top) -->
  <line x1="16" y1="1"  x2="16" y2="8"  stroke="#FFEBD3" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Cross lines (bottom) -->
  <line x1="16" y1="24" x2="16" y2="31" stroke="#FFEBD3" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Cross lines (left) -->
  <line x1="1"  y1="16" x2="8"  y2="16" stroke="#FFEBD3" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Cross lines (right) -->
  <line x1="24" y1="16" x2="31" y2="16" stroke="#FFEBD3" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Inner diamond -->
  <polygon points="16,12 20,16 16,20 12,16"
           fill="#67A2C5" opacity="0.8"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2.5" fill="#FFEBD3"/>
  <!-- Tiny tick marks at 45 degrees -->
  <line x1="21.2" y1="10.8" x2="22.8" y2="9.2"  stroke="#FFB6A6" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="10.8" y1="10.8" x2="9.2"  y2="9.2"  stroke="#FFB6A6" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="21.2" y1="21.2" x2="22.8" y2="22.8" stroke="#FFB6A6" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="10.8" y1="21.2" x2="9.2"  y2="22.8" stroke="#FFB6A6" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
</svg>
